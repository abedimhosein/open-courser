{% extends "base.html" %}

{% block title %}Tags - OpenCourser{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Tags</h1>
</div>

<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title mb-3"><i class="fa-solid fa-plus me-1"></i>Create Tag</h5>
        <form method="post" class="d-flex flex-wrap align-items-end gap-2">
            {% csrf_token %}
            <div class="flex-grow-1" style="min-width: 200px;">
                <label for="tag-name" class="form-label">Name</label>
                <input type="text" class="form-control" id="tag-name" name="name"
                       placeholder="e.g. Python" required>
            </div>
            <div>
                <label for="tag-color" class="form-label">Color</label>
                <input type="color" class="form-control form-control-color" id="tag-color" name="color"
                       value="#6c757d">
            </div>
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus me-1"></i>Create</button>
        </form>
    </div>
</div>

{% if tags %}
<table class="table table-hover">
    <thead>
        <tr>
            <th>Color</th>
            <th>Name</th>
            <th>Courses</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for tag in tags %}
        <tr>
            <td><span class="badge" style="background-color: {{ tag.color }};">&nbsp;&nbsp;&nbsp;</span></td>
            <td>
                <a href="{% url 'tag_courses' tag.pk %}" class="text-decoration-none">{{ tag.name }}</a>
            </td>
            <td>{{ tag.course_count }}</td>
            <td class="text-end">
                <a href="{% url 'tag_edit' tag.pk %}" class="btn btn-sm btn-outline-secondary">
                    <i class="fa-solid fa-pen"></i>
                </a>
                <a href="{% url 'tag_delete' tag.pk %}" class="btn btn-sm btn-outline-danger">
                    <i class="fa-solid fa-trash-can"></i>
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<div class="text-center py-3">
    <p class="text-muted">No tags yet.</p>
</div>
{% endif %}
{% endblock %}
