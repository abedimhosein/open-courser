<div id="course-file-list">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="fa-solid fa-tree me-1"></i>Course Files</span>
            <span class="badge bg-secondary">{{ file_nodes|length }} files</span>
        </div>
        <div class="list-group list-group-flush">
            {% if tree %}
            {% include "courses/_tree_branch.html" with nodes=tree depth=0 %}
            {% else %}
            <div class="list-group-item text-center text-muted py-4">
                <i class="fa-solid fa-folder-open me-2"></i>No files found. Scan the course to discover files.
            </div>
            {% endif %}
        </div>
    </div>
</div>
