{% load note_extras %}
<div class="rounded p-3 mb-3 note-card" id="note-{{ note.pk }}" style="background: var(--surface-raised); border: 1px solid var(--border-subtle);">
    <div class="d-flex justify-content-between align-items-start">
        <div class="flex-grow-1 note-markdown" style="color: rgba(255,255,255,0.85); font-size: 0.9rem; line-height: 1.6;">
            {{ note.content|markdown }}
        </div>
        <div class="dropdown ms-3">
            <button class="btn btn-sm" style="color: rgba(255,255,255,0.4); background: transparent; border: none;" data-bs-toggle="dropdown">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" style="background: var(--surface-raised); border: 1px solid var(--border-subtle);">
                <li>
                    <button class="dropdown-item"
                        style="color: rgba(255,255,255,0.8);"
                        hx-get="{% url 'note_edit' note.pk %}"
                        hx-target="#note-{{ note.pk }}"
                        hx-swap="outerHTML">
                        <i class="fa-solid fa-pen-to-square me-2"></i>Edit
                    </button>
                </li>
                <li>
                    <button class="dropdown-item"
                        style="color: #ff6b6b;"
                        hx-post="{% url 'note_delete' note.pk %}"
                        hx-target="#notes-section"
                        hx-swap="outerHTML"
                        hx-confirm="Delete this note?">
                        <i class="fa-solid fa-trash me-2"></i>Delete
                    </button>
                </li>
            </ul>
        </div>
    </div>
    <div class="mt-2 pt-2" style="border-top: 1px solid var(--border-subtle); font-size: 0.75rem; color: rgba(255,255,255,0.35);">
        {{ note.created_at|date:"M d, Y H:i" }}
        {% if note.updated_at != note.created_at %}
            <span class="ms-1">(edited {{ note.updated_at|date:"M d, Y H:i" }})</span>
        {% endif %}
    </div>
</div>
