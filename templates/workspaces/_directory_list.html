{% if parent_path %}
<button class="list-group-item list-group-item-action list-group-item-secondary"
        hx-get="{% url 'browse_directories' %}?path={{ parent_path|urlencode }}"
        hx-target="#directory-browser"
        hx-swap="outerHTML">
    ..
</button>
{% endif %}

{% for dir in directories %}
<div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
    <button class="btn btn-link text-decoration-none p-0 flex-grow-1 text-start"
            hx-get="{% url 'browse_directories' %}?path={{ dir.path|urlencode }}"
            hx-target="#directory-browser"
            hx-swap="outerHTML">
        {{ dir.name }}/
    </button>
    <button class="btn btn-sm btn-outline-primary ms-2"
            onclick="selectDir(this.getAttribute('data-select-dir'))"
            data-select-dir="{{ dir.path }}">
        Select
    </button>
</div>
{% empty %}
<div class="list-group-item text-muted text-center" id="dir-empty-state">
    No subdirectories found
</div>
{% endfor %}
