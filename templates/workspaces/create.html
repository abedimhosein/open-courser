{% extends "base.html" %}

{% block title %}Add Workspace - OpenCourser{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">Add Workspace</h1>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="name" class="form-label">Workspace Name</label>
                <input type="text" class="form-control" id="name" name="name"
                       placeholder="e.g. Python" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description"
                          rows="2" placeholder="Optional description"></textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus me-1"></i>Create Workspace</button>
            <a href="{% url 'workspace_list' %}" class="btn btn-secondary"><i class="fa-solid fa-xmark me-1"></i>Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
