{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <link rel="icon" type="image/svg+xml" href="{% static 'logo.svg' %}">
    <title>{% block title %}Local Course Manager{% endblock %}</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <script>
        document.addEventListener('htmx:configRequest', function(evt) {
            evt.detail.headers['X-CSRFToken'] = document.querySelector('meta[name="csrf-token"]').content;
        });
    </script>
    <script src="{% static 'js/alpine.min.js' %}" defer></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'workspace_list' %}">
                <img src="{% static 'logo.svg' %}" alt="" width="28" height="28" class="d-inline-block align-text-top me-2">
                OpenCourser
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'workspace_list' %}">Workspaces</a>
            </div>
        </div>
    </nav>

    <main class="container-fluid">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-top border-secondary mt-5 py-3 text-center text-muted small">
        <div class="container-fluid">
            OpenCourser — offline course progress tracker
            <span class="d-none d-sm-inline">&middot;</span>
            <span class="d-block d-sm-inline">Developed by <a href="https://www.linkedin.com/in/abedimhosein/" target="_blank" class="text-reset text-decoration-none link-light">Mohammad .H Abedi</a></span>
        </div>
    </footer>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
