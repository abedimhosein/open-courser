services:
  app:
    build: .
    ports:
      - "8412:8412"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./media:/app/media
      - ${COURSE_ROOT}:/courses:ro
    environment:
      - DEBUG=False
    command: >
      sh -c "mkdir -p /app/data && python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8412 --workers 4 --timeout 300"
