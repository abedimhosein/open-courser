services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - /path/to/your/courses:/courses:ro
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=False
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
