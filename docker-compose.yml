services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencourser}
      POSTGRES_USER: ${POSTGRES_USER:-opencourser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencourser}
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8412:8412"
    env_file:
      - .env
    volumes:
      - ./media:/app/media
    environment:
      - DEBUG=False
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-opencourser}
      - POSTGRES_USER=${POSTGRES_USER:-opencourser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-opencourser}
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8412 --workers 4 --timeout 300"

volumes:
  pgdata:
